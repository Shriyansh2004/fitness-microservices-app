spring:
  application:
    name: ai-service
  config:
      import: optional:configserver:http://localhost:8888

server:
  port: 8083


  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  mongodb:
    uri: mongodb://localhost:27017/fitnessrecommendation
    database: fitnessrecommendation


eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/


rabbitmq:
  exchange:
    name: fitness.exchange
  queue:
    name: activity.queue
  routing:
    key: activity.tracking


gemini:
  api:
    url: ${GEMINI_API_URL}
    key: ${GEMINI_API_KEY}
